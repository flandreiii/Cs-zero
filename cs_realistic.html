<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CS:ZERO — Realistic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;}
#c{display:block;width:100vw;height:100vh;}

/* ── OVERLAYS ── */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;transition:opacity .08s;}
#blood{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(160,0,0,.7) 100%);opacity:0;pointer-events:none;z-index:99;transition:opacity .3s;}
#vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:5;}
#scope-blur{position:fixed;inset:0;backdrop-filter:blur(0px);pointer-events:none;z-index:6;transition:backdrop-filter .1s;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;color:#fff;}

#topbar{position:absolute;top:0;left:0;right:0;padding:10px 18px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,transparent 100%);
  font-size:11px;letter-spacing:2px;}
.round-label{color:#ffcc00;font-size:10px;letter-spacing:3px;}
#tmr{color:#fff;font-size:22px;font-weight:bold;text-shadow:0 0 10px rgba(255,255,255,.4);}
.money-label{color:#4cff72;}

/* Crosshair */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;transition:all .05s;}
.ch-line{position:absolute;background:rgba(180,255,180,.9);box-shadow:0 0 4px rgba(0,255,0,.6);}
.ch-top{width:2px;height:10px;left:9px;top:-14px;}
.ch-bot{width:2px;height:10px;left:9px;bottom:-14px;}
.ch-lft{height:2px;width:10px;top:9px;left:-14px;}
.ch-rgt{height:2px;width:10px;top:9px;right:-14px;}
.ch-dot{width:3px;height:3px;background:rgba(180,255,180,.9);border-radius:50%;left:9px;top:9px;box-shadow:0 0 4px rgba(0,255,0,.8);}
#xhair.spread .ch-top{transform:translateY(-4px);}
#xhair.spread .ch-bot{transform:translateY(4px);}
#xhair.spread .ch-lft{transform:translateX(-4px);}
#xhair.spread .ch-rgt{transform:translateX(4px);}

/* Hit marker */
#hm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;transition:opacity .05s;}
#hm.on{opacity:1;}
#hm svg line{stroke:#ff3030;stroke-width:2.5;filter:drop-shadow(0 0 3px #ff0000);}

/* Kill feed */
#kfeed{position:absolute;top:56px;right:12px;display:flex;flex-direction:column;gap:3px;}
.ke{background:rgba(0,0,0,.7);padding:4px 10px;font-size:11px;color:#fff;
  border-left:3px solid #ff4040;backdrop-filter:blur(4px);
  animation:fadeK 3s forwards;}
@keyframes fadeK{0%{opacity:1;transform:translateX(0)}75%{opacity:1}100%{opacity:0;transform:translateX(20px)}}

/* Damage indicator */
#dmg-dir{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;pointer-events:none;opacity:0;transition:opacity .1s;}
#dmg-dir.show{opacity:1;}

/* Bottom HUD */
#bhud{position:absolute;bottom:0;left:0;right:0;padding:8px 16px;padding-bottom:175px;
  display:flex;justify-content:space-between;align-items:flex-end;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);}
.hb{display:flex;flex-direction:column;gap:1px;}
.hl{font-size:9px;color:#888;letter-spacing:2px;text-transform:uppercase;}
.hv{font-size:24px;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.hpv{color:#4cff72;}.hpv.low{color:#ff4040;animation:pulse .5s infinite;}
.amv{color:#fff;}.amres{font-size:13px;color:#777;}
.wn{color:#ffcc00;font-size:10px;letter-spacing:3px;margin-bottom:2px;}
.kv{color:#00cfff;text-align:right;}.kl{color:#ff5555;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Reload */
#rbar{position:absolute;bottom:170px;left:50%;transform:translateX(-50%);
  width:170px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;display:none;}
#rprog{height:100%;background:linear-gradient(90deg,#ffcc00,#ff8800);width:0%;border-radius:2px;transition:width linear;}
#rtxt{position:absolute;bottom:178px;left:50%;transform:translateX(-50%);
  font-size:9px;color:#ffcc00;letter-spacing:4px;display:none;
  text-shadow:0 0 8px rgba(255,200,0,.6);}

/* ── TOUCH CONTROLS ── */
#touch-layer{position:fixed;inset:0;z-index:30;}
#joy-zone{position:absolute;bottom:0;left:0;width:50%;height:190px;}
#joy-base{position:absolute;width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.2);
  display:none;backdrop-filter:blur(2px);}
#joy-stick{position:absolute;width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.5),rgba(255,255,255,.2));
  border:1.5px solid rgba(255,255,255,.5);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.5);}
#look-zone{position:absolute;top:0;right:0;width:50%;height:100%;}

/* Buttons */
.ctrl-btn{
  position:absolute;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',monospace;font-weight:bold;
  pointer-events:all;cursor:pointer;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  transition:background .08s, transform .05s;
}
.ctrl-btn:active{transform:scale(.92);}

#btn-shoot{
  bottom:80px;right:18px;width:78px;height:78px;
  background:rgba(220,40,40,.3);border:2px solid rgba(255,60,60,.7);
  color:#fff;font-size:11px;letter-spacing:1px;
  box-shadow:0 0 16px rgba(255,50,50,.3), inset 0 1px 0 rgba(255,255,255,.1);
}
#btn-shoot.firing{background:rgba(255,60,60,.6);box-shadow:0 0 24px rgba(255,100,100,.6);}

#btn-reload{
  bottom:88px;right:112px;width:54px;height:54px;
  background:rgba(200,160,0,.2);border:1.5px solid rgba(255,200,0,.5);
  color:#ffcc00;font-size:9px;letter-spacing:1px;
  box-shadow:0 0 10px rgba(255,200,0,.2);
}

#btn-jump{
  bottom:172px;right:26px;width:50px;height:50px;
  background:rgba(60,160,255,.2);border:1.5px solid rgba(100,180,255,.5);
  color:#88ccff;font-size:9px;letter-spacing:1px;
}

/* Radar */
#radar{position:absolute;top:56px;left:10px;width:95px;height:95px;border-radius:50%;
  background:rgba(0,10,0,.75);border:1px solid rgba(0,255,70,.2);overflow:hidden;
  box-shadow:0 0 12px rgba(0,255,70,.1), inset 0 0 20px rgba(0,0,0,.5);}
#radar canvas{width:100%;height:100%;}

/* Ammo shell icons */
#ammo-shells{position:absolute;bottom:162px;right:22px;display:flex;gap:2px;align-items:flex-end;}
.shell{width:3px;height:8px;background:rgba(255,200,0,.6);border-radius:1px;transition:background .1s;}
.shell.empty{background:rgba(255,255,255,.1);}

/* Menu */
#menu{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(0,0,0,.95) 0%,rgba(5,10,15,.98) 100%);}
#menu::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,70,.01) 2px,rgba(0,255,70,.01) 4px);
  pointer-events:none;}
#menu h1{font-size:52px;font-weight:900;letter-spacing:10px;
  background:linear-gradient(135deg,#ffcc00,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 30px rgba(255,180,0,.4));margin-bottom:4px;}
#menu .sub{color:#445;letter-spacing:5px;font-size:10px;margin-bottom:50px;}
#menu .sbtn{padding:15px 48px;border:1px solid rgba(255,200,0,.5);color:#ffcc00;font-size:14px;
  font-family:'Courier New',monospace;letter-spacing:5px;cursor:pointer;background:rgba(255,200,0,.05);
  transition:all .2s;pointer-events:all;backdrop-filter:blur(4px);
  box-shadow:0 0 20px rgba(255,200,0,.1);}
#menu .sbtn:active{background:rgba(255,200,0,.2);box-shadow:0 0 30px rgba(255,200,0,.3);}
#menu .ctrl{margin-top:40px;color:#333;font-size:10px;line-height:2.4;text-align:center;letter-spacing:1px;}
#menu .ctrl span{color:#556;}

/* Game over */
#gover{position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
#gover h2{font-size:44px;color:#ff3030;letter-spacing:7px;margin-bottom:12px;
  text-shadow:0 0 30px rgba(255,0,0,.5);}
#gover .fs{font-size:18px;color:#ffcc00;margin-bottom:32px;letter-spacing:3px;}
#gover .rbtn{padding:13px 40px;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;
  font-family:'Courier New',monospace;letter-spacing:4px;cursor:pointer;background:rgba(255,255,255,.05);
  pointer-events:all;transition:all .2s;}
#gover .rbtn:active{background:rgba(255,255,255,.15);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="blood"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="topbar">
    <div class="round-label">ROUND <span id="rnum">1</span></div>
    <div id="tmr">1:55</div>
    <div class="money-label">$<span id="mny">800</span></div>
  </div>
  <div id="xhair">
    <div class="ch-line ch-top"></div>
    <div class="ch-line ch-bot"></div>
    <div class="ch-line ch-lft"></div>
    <div class="ch-line ch-rgt"></div>
    <div class="ch-line ch-dot"></div>
  </div>
  <div id="hm">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <line x1="2" y1="2" x2="10" y2="10"/>
      <line x1="26" y1="2" x2="18" y2="10"/>
      <line x1="2" y1="26" x2="10" y2="18"/>
      <line x1="26" y1="26" x2="18" y2="18"/>
    </svg>
  </div>
  <div id="kfeed"></div>
  <div id="radar"><canvas id="rc" width="95" height="95"></canvas></div>
  <div id="ammo-shells"></div>
  <div id="rtxt">RELOADING</div>
  <div id="rbar"><div id="rprog"></div></div>
  <div id="bhud">
    <div class="hb">
      <div class="hl">HP</div>
      <div class="hv hpv" id="hpEl">100</div>
    </div>
    <div class="hb" style="text-align:center">
      <div class="wn">AK-47</div>
      <div class="hv amv"><span id="amEl">30</span><span class="amres"> / <span id="rsEl">90</span></span></div>
    </div>
    <div class="hb" style="text-align:right">
      <div class="hl kl">KILLS</div>
      <div class="hv kv" id="klEl">0</div>
    </div>
  </div>
</div>

<div id="touch-layer">
  <div id="joy-zone">
    <div id="joy-base"><div id="joy-stick"></div></div>
  </div>
  <div id="look-zone"></div>
  <div class="ctrl-btn" id="btn-shoot">FIRE</div>
  <div class="ctrl-btn" id="btn-reload">R</div>
  <div class="ctrl-btn" id="btn-jump">▲</div>
</div>

<div id="menu">
  <h1>CS:ZERO</h1>
  <div class="sub">REALISTIC EDITION</div>
  <button class="sbtn" id="sbtn">▶  DEPLOY</button>
  <div class="ctrl">
    <span>LEFT THUMB</span> — Move &nbsp;&nbsp; <span>RIGHT THUMB</span> — Aim<br>
    <span>FIRE</span> — Shoot &nbsp;&nbsp; <span>R</span> — Reload &nbsp;&nbsp; <span>▲</span> — Jump
  </div>
</div>
<div id="gover">
  <h2>ELIMINATED</h2>
  <div class="fs">KILLS: <span id="fk">0</span></div>
  <button class="rbtn" id="rbtn">REDEPLOY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  CS:ZERO  —  Realistic Graphics Mobile FPS
//  Procedural PBR-style textures, multi-lights,
//  skybox, fog, shadow, post effects via canvas
// ═══════════════════════════════════════════════

const W=window.innerWidth, H=window.innerHeight;
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights=true;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x8899aa,.022);

const camera=new THREE.PerspectiveCamera(72,W/H,.05,200);
camera.position.set(0,1.7,0);

// ── PROCEDURAL TEXTURE GENERATOR ──
function makeTexture(size,drawFn){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const ctx=cv.getContext('2d'); drawFn(ctx,size);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

// Concrete texture
const concreteTex=makeTexture(512,(ctx,s)=>{
  ctx.fillStyle='#6a6258'; ctx.fillRect(0,0,s,s);
  for(let i=0;i<4000;i++){
    const x=Math.random()*s,y=Math.random()*s,r=Math.random()*3+.5;
    const v=Math.floor(Math.random()*30)-15;
    ctx.fillStyle=`rgba(${100+v},${95+v},${85+v},${Math.random()*.6+.1})`;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // Cracks
  for(let i=0;i<8;i++){
    ctx.strokeStyle=`rgba(0,0,0,${Math.random()*.3+.1})`;
    ctx.lineWidth=Math.random()*1.5+.3;
    ctx.beginPath();
    let x=Math.random()*s,y=Math.random()*s;
    ctx.moveTo(x,y);
    for(let j=0;j<6;j++){x+=Math.random()*40-20;y+=Math.random()*40-20;ctx.lineTo(x,y);}
    ctx.stroke();
  }
});
concreteTex.repeat.set(4,4);

// Brick texture
const brickTex=makeTexture(512,(ctx,s)=>{
  ctx.fillStyle='#8b5a3a'; ctx.fillRect(0,0,s,s);
  const BW=64,BH=32,mortar=4;
  for(let row=0;row<s/BH;row++){
    const offset=(row%2)*BW/2;
    for(let col=-1;col<s/BW+1;col++){
      const x=col*BW+offset,y=row*BH;
      const r=Math.floor(Math.random()*30);
      ctx.fillStyle=`rgb(${139+r},${80+r},${50+r})`;
      ctx.fillRect(x+mortar/2,y+mortar/2,BW-mortar,BH-mortar);
      // Specks
      for(let k=0;k<20;k++){
        const sx=x+mortar+Math.random()*(BW-mortar*2);
        const sy=y+mortar+Math.random()*(BH-mortar*2);
        const v=Math.floor(Math.random()*20)-10;
        ctx.fillStyle=`rgba(${139+r+v},${70+r+v},${40+r+v},.4)`;
        ctx.fillRect(sx,sy,2,2);
      }
    }
  }
  // Mortar lines shadows
  ctx.fillStyle='rgba(0,0,0,.25)';
  for(let row=0;row<s/BH;row++){
    ctx.fillRect(0,row*BH,s,mortar);
    const offset=(row%2)*BW/2;
    for(let col=-1;col<s/BW+1;col++){
      ctx.fillRect(col*BW+offset,row*BH,mortar,BH);
    }
  }
});
brickTex.repeat.set(3,3);

// Ground texture (asphalt/dirt)
const groundTex=makeTexture(512,(ctx,s)=>{
  ctx.fillStyle='#4a4238'; ctx.fillRect(0,0,s,s);
  for(let i=0;i<6000;i++){
    const x=Math.random()*s,y=Math.random()*s;
    const v=Math.floor(Math.random()*25)-12;
    const r=Math.random()*2.5+.5;
    ctx.fillStyle=`rgba(${70+v},${60+v},${50+v},${Math.random()*.8+.2})`;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // Gravel patches
  for(let i=0;i<200;i++){
    const x=Math.random()*s,y=Math.random()*s;
    const w=Math.random()*12+4,h=Math.random()*8+3;
    const v=Math.floor(Math.random()*20);
    ctx.fillStyle=`rgba(${90+v},${80+v},${65+v},.5)`;
    ctx.beginPath();ctx.ellipse(x,y,w/2,h/2,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();
  }
});
groundTex.repeat.set(16,16);

// Metal/crate texture
const crateTex=makeTexture(256,(ctx,s)=>{
  ctx.fillStyle='#7a5c2a'; ctx.fillRect(0,0,s,s);
  // Wood grain
  for(let i=0;i<30;i++){
    const y=Math.random()*s;
    ctx.strokeStyle=`rgba(${Math.random()>0.5?100:50},${Math.random()*20+30},${Math.random()*10},${Math.random()*.4+.1})`;
    ctx.lineWidth=Math.random()*4+1;
    ctx.beginPath();ctx.moveTo(0,y);
    let cx=0;
    while(cx<s){cx+=20;ctx.lineTo(cx,y+(Math.random()-0.5)*4);}
    ctx.stroke();
  }
  // Edge darkening
  const grad=ctx.createRadialGradient(s/2,s/2,s*.3,s/2,s/2,s*.7);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,s,s);
  // Metal straps
  ctx.fillStyle='rgba(80,70,60,.7)';
  ctx.fillRect(0,s*.12,s,8);ctx.fillRect(0,s*.82,s,8);
  ctx.fillRect(s*.12,0,8,s);ctx.fillRect(s*.82,0,8,s);
});
crateTex.repeat.set(1,1);

// Metal plate texture (for structures)
const metalTex=makeTexture(256,(ctx,s)=>{
  ctx.fillStyle='#555a5f'; ctx.fillRect(0,0,s,s);
  // Scratches
  for(let i=0;i<60;i++){
    const x=Math.random()*s,y=Math.random()*s;
    const len=Math.random()*40+10;
    const ang=Math.random()*Math.PI;
    ctx.strokeStyle=`rgba(${Math.random()>0.5?200:100},${Math.random()>0.5?200:100},${Math.random()>0.5?200:100},${Math.random()*.3+.05})`;
    ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len);ctx.stroke();
  }
  // Rivets
  for(let row=0;row<4;row++) for(let col=0;col<4;col++){
    const rx=col*(s/4)+s/8,ry=row*(s/4)+s/8;
    const g=ctx.createRadialGradient(rx-2,ry-2,1,rx,ry,6);
    g.addColorStop(0,'rgba(200,200,200,.8)');
    g.addColorStop(.5,'rgba(100,100,100,.5)');
    g.addColorStop(1,'rgba(0,0,0,.3)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(rx,ry,5,0,Math.PI*2);ctx.fill();
  }
});
metalTex.repeat.set(2,2);

// Sky gradient texture
function makeSkybox(){
  const geo=new THREE.SphereGeometry(180,32,16);
  const cv=document.createElement('canvas');cv.width=2;cv.height=256;
  const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#0a1520');
  g.addColorStop(.3,'#1a2d3f');
  g.addColorStop(.6,'#2a4055');
  g.addColorStop(.8,'#3d5060');
  g.addColorStop(1,'#556070');
  ctx.fillStyle=g;ctx.fillRect(0,0,2,256);
  const t=new THREE.CanvasTexture(cv);
  t.mapping=THREE.EquirectangularReflectionMapping;
  const mat=new THREE.MeshBasicMaterial({map:t,side:THREE.BackSide});
  const sky=new THREE.Mesh(geo,mat);
  scene.add(sky);

  // Stars
  const starGeo=new THREE.BufferGeometry();
  const starPos=[];
  for(let i=0;i<800;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.random()*Math.PI*.5;
    starPos.push(Math.sin(phi)*Math.cos(theta)*170,Math.cos(phi)*170,Math.sin(phi)*Math.sin(theta)*170);
  }
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starPos,3));
  const starMat=new THREE.PointsMaterial({color:0xffffff,size:.4,transparent:true,opacity:.8});
  scene.add(new THREE.Points(starGeo,starMat));
}
makeSkybox();

// Moon
const moonGeo=new THREE.SphereGeometry(4,16,16);
const moonMat=new THREE.MeshBasicMaterial({color:0xdde8f0});
const moon=new THREE.Mesh(moonGeo,moonMat);
moon.position.set(-60,80,-120);
scene.add(moon);

// Moon light halo
const haloGeo=new THREE.SphereGeometry(5.5,16,16);
const haloMat=new THREE.MeshBasicMaterial({color:0xaabbcc,transparent:true,opacity:.15,side:THREE.BackSide});
const haloMesh=new THREE.Mesh(haloGeo,haloMat); haloMesh.position.copy(moon.position); scene.add(haloMesh);

// ── LIGHTING ──
// Moonlight (main)
const moonLight=new THREE.DirectionalLight(0x9bb8d4,.8);

function makeEnemyMat(color){return stdMat({color,roughness:.7,metalness:.1});}

class Enemy {
  constructor(){
    this.g=new THREE.Group();
    // Body (tactical vest shape)
    const torso=new THREE.Mesh(new THREE.BoxGeometry(.5,.7,.3),makeEnemyMat(0x2a2f2a));
    torso.position.y=.9;torso.castShadow=true;
    // Vest highlight
    const vest=new THREE.Mesh(new THREE.BoxGeometry(.52,.4,.32),makeEnemyMat(0x1a2a1a));
    vest.position.y=1.0;
    // Head
    const head=new THREE.Mesh(new THREE.SphereGeometry(.22,12,10),makeEnemyMat(0xc8a882));
    head.position.y=1.6;head.castShadow=true;
    // Helmet
    const helm=new THREE.Mesh(new THREE.SphereGeometry(.25,12,8),makeEnemyMat(0x1a1a18));
    helm.position.y=1.62;
    // Legs
    const legL=new THREE.Mesh(new THREE.BoxGeometry(.2,.65,.22),makeEnemyMat(0x282f28));
    legL.position.set(-.14,.3,0);legL.castShadow=true;
    const legR=new THREE.Mesh(new THREE.BoxGeometry(.2,.65,.22),makeEnemyMat(0x282f28));
    legR.position.set(.14,.3,0);legR.castShadow=true;
    // Arms
    const armL=new THREE.Mesh(new THREE.CylinderGeometry(.08,.07,.5,8),makeEnemyMat(0x2a2f2a));
    armL.position.set(-.32,.95,0);armL.rotation.z=.4;
    const armR=new THREE.Mesh(new THREE.CylinderGeometry(.08,.07,.5,8),makeEnemyMat(0x2a2f2a));
    armR.position.set(.32,.95,0);armR.rotation.z=-.4;
    // Enemy gun
    const eGun=new THREE.Mesh(new THREE.BoxGeometry(.04,.08,.35),makeEnemyMat(0x1a1a1a));
    eGun.position.set(.3,1.0,-.25);
    // Eyes glow (tactical goggles)
    const gogL=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),new THREE.MeshBasicMaterial({color:0x00ff60}));
    const gogR=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),new THREE.MeshBasicMaterial({color:0x00ff60}));
    gogL.position.set(-.09,1.61,.2);gogR.position.set(.09,1.61,.2);
    this.g.add(torso,vest,head,helm,legL,legR,armL,armR,eGun,gogL,gogR);
    this.hp=100;this.maxHp=100;
    this.speed=1.8+Math.random()*.8;
    this.sCool=1.8+Math.random()*2;this.sTimer=Math.random()*2;
    this.state='patrol';this.patT=new THREE.Vector3();
    this.newPatrol();this.spawn();scene.add(this.g);
    this.legAnim=0;
    // HP bar
    this.hpBar=this.makeHpBar();
  }
  makeHpBar(){
    const grp=new THREE.Group();
    const bg=new THREE.Mesh(new THREE.PlaneGeometry(.6,.07),new THREE.MeshBasicMaterial({color:0x330000,transparent:true,opacity:.8,depthWrite:false}));
    const bar=new THREE.Mesh(new THREE.PlaneGeometry(.58,.05),new THREE.MeshBasicMaterial({color:0x00ff40,transparent:true,opacity:.9,depthWrite:false}));
    bar.position.z=.001;
    grp.add(bg,bar);grp.position.y=2.2;grp.userData.bar=bar;
    this.g.add(grp);
    return grp;
  }
  spawn(){
    const a=Math.random()*Math.PI*2,d=18+Math.random()*22;
    this.g.position.set(Math.cos(a)*d,0,Math.sin(a)*d);
  }
  newPatrol(){this.patT.set((Math.random()-.5)*70,0,(Math.random()-.5)*70);}
  update(dt,pp){
    if(this.hp<=0) return;
    const tp=new THREE.Vector3().subVectors(pp,this.g.position);tp.y=0;
    const dist=tp.length();
    if(dist<35) this.state='chase'; else if(dist>40) this.state='patrol';
    let md=new THREE.Vector3();
    if(this.state==='chase'){md.copy(tp).normalize();}
    else{
      const toPat=new THREE.Vector3().subVectors(this.patT,this.g.position);toPat.y=0;
      if(toPat.length()<2) this.newPatrol();
      md.copy(toPat).normalize();
    }
    this.g.position.addScaledVector(md,this.speed*dt);
    this.g.position.clamp(new THREE.Vector3(-43,0,-43),new THREE.Vector3(43,0,43));
    this.g.lookAt(this.g.position.x+md.x,1,this.g.position.z+md.z);
    // Leg animation
    this.legAnim+=dt*this.speed*3;
    this.g.children[4].rotation.x=Math.sin(this.legAnim)*.4;
    this.g.children[5].rotation.x=Math.sin(this.legAnim+Math.PI)*.4;
    // HP bar face camera
    if(this.hpBar){
      this.hpBar.lookAt(camera.position);
      const pct=this.hp/this.maxHp;
      const bar=this.hpBar.userData.bar;
      bar.scale.x=pct;bar.position.x=(pct-1)*.29;
      bar.material.color.setRGB(1-pct,pct*.8,0);
    }
    if(this.state==='chase'&&dist<22){
      this.sTimer-=dt;
      if(this.sTimer<=0){
        this.sTimer=this.sCool;
        if(Math.random()<.45/(dist/8+1)) dPlayer(8+Math.floor(Math.random()*12));
      }
    }
  }
  hit(dmg,pos){
    this.hp-=dmg;
    spawnParts(pos||this.g.position.clone().add(new THREE.Vector3(0,1,0)),0xcc1010,6);
    if(this.hp<=0) this.die();
  }
  die(){
    spawnParts(this.g.position.clone().add(new THREE.Vector3(0,1,0)),0xaa0808,16,5);
    scene.remove(this.g);
    kills++;money+=300;
    document.getElementById('klEl').textContent=kills;
    document.getElementById('mny').textContent=money;
    addKF();
    setTimeout(()=>{if(gameOn){this.hp=100;this.state='patrol';this.spawn();scene.add(this.g);}},5000+Math.random()*5000);
  }
}

const joy={active:false,id:-1,baseX:0,baseY:0,dx:0,dy:0};

const joyZone=document.getElementById('joy-zone');

const joyBase=document.getElementById('joy-base');
const joyStick=document.getElementById('joy-stick');

joyZone.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.changedTouches[0];
  joy.active=true;joy.id=t.identifier;joy.baseX=t.clientX;joy.baseY=t.clientY;joy.dx=0;joy.dy=0;
  joyBase.style.display='block';
  const r=joyZone.getBoundingClientRect();
  joyBase.style.left=(t.clientX-r.left-60)+'px';
  joyBase.style.top=(t.clientY-r.top-60)+'px';
  joyBase.style.bottom='auto';
},{passive:false});
joyZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===joy.id){
    const dx=t.clientX-joy.baseX,dy=t.clientY-joy.baseY;
    const l=Math.sqrt(dx*dx+dy*dy),maxR=50,c=Math.min(l,maxR)/maxR;
    joy.dx=(dx/Math.max(l,1))*c;joy.dy=(dy/Math.max(l,1))*c;
    joyStick.style.transform=`translate(calc(-50% + ${joy.dx*maxR}px),calc(-50% + ${joy.dy*maxR}px))`;
  }
},{passive:false});
joyZone.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===joy.id){
    joy.active=false;joy.dx=0;joy.dy=0;
    joyBase.style.display='none';
    joyStick.style.transform='translate(-50%,-50%)';
  }
},{passive:false});

lookZone.addEventListener('touchstart',e=>{
  e.preventDefault();const t=e.changedTouches[0];

},{passive:false});

    yaw-=(t.clientX-look.lastX)*.0038;
    pitch-=(t.clientY-look.lastY)*.0038;
    pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,pitch));
    look.lastX=t.clientX;look.lastY=t.clientY;

},{passive:false});

// ── SHOOT ──
function doShoot(){
  if(!gameOn||reloading)return;
  if(ammo<=0){startReload();return;}
  if(shootCD>0)return;
  ammo--;updateAmmoShells();
  document.getElementById('amEl').textContent=ammo;
  shootCD=.1;
  // Recoil
  gunGrp.position.z=.08;gunGrp.rotation.x=.06;gunGrp.position.y=.012;
  // Flash
  flMat.opacity=1;flM2.material.opacity=.8;
  muzzLight.intensity=8;
  setTimeout(()=>{flMat.opacity=0;flM2.material.opacity=0;muzzLight.intensity=0;},55);
  // Screen flash
  document.getElementById('flash').style.opacity='.045';
  setTimeout(()=>{document.getElementById('flash').style.opacity='0';},55);
  // Crosshair spread
  document.getElementById('xhair').classList.add('spread');
  setTimeout(()=>document.getElementById('xhair').classList.remove('spread'),120);

  const ray=new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(0,0),camera);
  // Spread
  ray.ray.direction.x+=(Math.random()-.5)*.014;
  ray.ray.direction.y+=(Math.random()-.5)*.014;
  ray.ray.direction.normalize();

  // Enemy check
  const eMeshes=enemies.filter(e=>e.hp>0).flatMap(e=>e.g.children);
  const hits=ray.intersectObjects(eMeshes,true);
  let hitSomething=false;
  if(hits.length){
    const h=hits[0];
    for(const en of enemies){
      const isChild=en.g.children.some(c=>c===h.object||c.children?.includes(h.object));
      if(isChild){
        const isHead=h.object.position.y>1.4&&h.object.geometry instanceof THREE.SphereGeometry;
        en.hit(isHead?92:22+Math.floor(Math.random()*18),h.point);
        showHM();hitSomething=true;break;
      }
    }
    showTracer(camera.position.clone(),h.point);
    hitSomething=true;
  }
  if(!hitSomething){
    const wMeshes=wallCols.map(w=>w.mesh);
    const wh=ray.intersectObjects(wMeshes);
    if(wh.length){
      spawnSparks(wh[0].point);
      spawnParts(wh[0].point,0xaaaaaa,4,2);
      addBulletHole(wh[0].point,wh[0].face.normal);
      showTracer(camera.position.clone(),wh[0].point);
    } else {
      showTracer(camera.position.clone(),ray.ray.direction.clone().multiplyScalar(80).add(camera.position));
    }
  }
}

function showTracer(a,b){
  tracGeo.setFromPoints([a,b]);tracMat.opacity=.5;
  setTimeout(()=>{tracMat.opacity=0;},90);
}
function showHM(){document.getElementById('hm').classList.add('on');hmTimer=.18;}

function startReload(){
  reloading=true;reloadLeft=2.5;
  document.getElementById('rtxt').style.display='block';
  document.getElementById('rbar').style.display='block';
  document.getElementById('rprog').style.transition='width 2.5s linear';
  document.getElementById('rprog').style.width='100%';
}
function finishReload(){
  const need=30-ammo,take=Math.min(need,reserve);
  ammo+=take;reserve-=take;
  document.getElementById('amEl').textContent=ammo;
  document.getElementById('rsEl').textContent=reserve;
  updateAmmoShells();
  reloading=false;
  document.getElementById('rtxt').style.display='none';
  document.getElementById('rbar').style.display='none';
  document.getElementById('rprog').style.transition='none';
  document.getElementById('rprog').style.width='0%';
}

function dPlayer(amt){
  if(!gameOn)return;
  hp=Math.max(0,hp-amt);
  document.getElementById('hpEl').textContent=hp;
  document.getElementById('hpEl').className='hv hpv'+(hp<30?' low':'');
  document.getElementById('blood').style.opacity=Math.min(.95,(100-hp)/55);
  // Screen shake (via small camera nudge)
  const shake=amt*.003;
  gunGrp.rotation.z=((Math.random()-.5)*shake);
  setTimeout(()=>{gunGrp.rotation.z=0;},100);
  if(hp<=0)endGame();
}

const KM=['ELIMINATED','HEADSHOT ✕','NEUTRALIZED','DOWN','FRAGGED','TERMINATED'];
function addKF(){
  const f=document.getElementById('kfeed');
  const e=document.createElement('div');e.className='ke';
  e.textContent=`YOU ▸ ${KM[Math.floor(Math.random()*KM.length)]} ▸ T`;
  f.appendChild(e);
  setTimeout(()=>{if(e.parentNode)f.removeChild(e);},3200);
}

function updTimer(){
  const m=Math.floor(roundTime/60),s=roundTime%60;
  document.getElementById('tmr').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  if(roundTime<=0){roundTime=115;document.getElementById('rnum').textContent=parseInt(document.getElementById('rnum').textContent)+1;}
}

// ── RADAR ──
const rctx=document.getElementById('rc').getContext('2d');
function drawRadar(){
  const s=95;rctx.clearRect(0,0,s,s);
  rctx.fillStyle='rgba(0,15,5,.8)';
  rctx.beginPath();rctx.arc(s/2,s/2,s/2,0,Math.PI*2);rctx.fill();
  // Sweep line (animated)
  const sw=performance.now()*.001;
  const grd=rctx.createConicalGradient?.(s/2,s/2,sw)
  rctx.strokeStyle='rgba(0,255,60,.08)';rctx.lineWidth=.5;
  for(let r=15;r<s/2;r+=15){rctx.beginPath();rctx.arc(s/2,s/2,r,0,Math.PI*2);rctx.stroke();}
  // Cross
  rctx.strokeStyle='rgba(0,255,60,.12)';
  rctx.beginPath();rctx.moveTo(s/2,0);rctx.lineTo(s/2,s);
  rctx.moveTo(0,s/2);rctx.lineTo(s,s/2);rctx.stroke();
  // Player dot
  rctx.shadowColor='#00ff40';rctx.shadowBlur=6;
  rctx.fillStyle='#00ff40';rctx.beginPath();rctx.arc(s/2,s/2,4,0,Math.PI*2);rctx.fill();
  // Direction
  rctx.strokeStyle='#00ff40';rctx.lineWidth=1.5;
  rctx.beginPath();rctx.moveTo(s/2,s/2);rctx.lineTo(s/2+Math.sin(yaw)*11,s/2-Math.cos(yaw)*11);rctx.stroke();
  rctx.shadowBlur=0;
  // Enemies
  const sc=s/80*.45;
  enemies.forEach(en=>{
    if(en.hp<=0)return;
    const ex=s/2+(en.g.position.x-camera.position.x)*sc;
    const ey=s/2+(en.g.position.z-camera.position.z)*sc;
    if(ex<2||ex>s-2||ey<2||ey>s-2)return;
    rctx.shadowColor='#ff4040';rctx.shadowBlur=4;
    rctx.fillStyle='#ff3030';rctx.beginPath();rctx.arc(ex,ey,3,0,Math.PI*2);rctx.fill();
    rctx.shadowBlur=0;
  });
}

// ── MOVEMENT ──
function movePlayer(dt){
  const spd=5.2;
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const mv=new THREE.Vector3();
  if(joy.active){mv.addScaledVector(fwd,-joy.dy);mv.addScaledVector(rgt,joy.dx);}
  if(mv.length()>.01)mv.normalize();

  if(jumpQueued&&onGnd){vertV=5.8;onGnd=false;jumpQueued=false;}
  vertV-=17*dt;
  camera.position.y+=vertV*dt;
  if(camera.position.y<=PHEIGHT){camera.position.y=PHEIGHT;vertV=0;onGnd=true;}

  const nx=camera.position.x+mv.x*spd*dt;
  const nz=camera.position.z+mv.z*spd*dt;
  let canX=true,canZ=true;
  const bx=new THREE.Box3(new THREE.Vector3(nx-PRAD,0,camera.position.z-PRAD),new THREE.Vector3(nx+PRAD,PHEIGHT*2,camera.position.z+PRAD));
  const bz=new THREE.Box3(new THREE.Vector3(camera.position.x-PRAD,0,nz-PRAD),new THREE.Vector3(camera.position.x+PRAD,PHEIGHT*2,nz+PRAD));
  for(const w of wallCols){
    if(bx.intersectsBox(w.b))canX=false;
    if(bz.intersectsBox(w.b))canZ=false;
  }
  if(canX)camera.position.x=Math.max(-43,Math.min(43,nx));
  if(canZ)camera.position.z=Math.max(-43,Math.min(43,nz));

  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;

  // Head bob
  if(joy.active&&onGnd){
    const t=performance.now()*.006;
    gunGrp.position.y+=Math.sin(t)*.007-gunGrp.position.y*.1;
    gunGrp.position.x+=Math.cos(t*.5)*.003-gunGrp.position.x*.1;
  }
}

// ── GAME LIFECYCLE ──
function startGame(){
  document.getElementById('menu').style.display='none';
  gameOn=true;
  for(let i=0;i<ECNT;i++)enemies.push(new Enemy());
}
function endGame(){
  gameOn=false;document.exitPointerLock?.();
  document.getElementById('fk').textContent=kills;
  document.getElementById('gover').style.display='flex';
}
function restartGame(){
  enemies.forEach(e=>scene.remove(e.g));enemies.length=0;
  hp=100;ammo=30;reserve=90;kills=0;money=800;roundTime=115;
  camera.position.set(0,PHEIGHT,0);yaw=0;pitch=0;
  document.getElementById('hpEl').textContent='100';
  document.getElementById('hpEl').className='hv hpv';
  document.getElementById('amEl').textContent='30';
  document.getElementById('rsEl').textContent='90';
  document.getElementById('klEl').textContent='0';
  document.getElementById('mny').textContent='800';
  document.getElementById('blood').style.opacity='0';
  document.getElementById('gover').style.display='none';
  document.getElementById('rnum').textContent='1';
  updateAmmoShells();
  for(let i=0;i<ECNT;i++)enemies.push(new Enemy());
  gameOn=true;
}

document.getElementById('sbtn').addEventListener('click',startGame);
document.getElementById('rbtn').addEventListener('click',restartGame);

// ── MAIN LOOP ──
let last=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-last)/1000,.05);last=t;
  if(!gameOn){renderer.render(scene,camera);return;}

  if(shootCD>0)shootCD-=dt;
  // Gun recoil recovery
  gunGrp.position.z+=(0-gunGrp.position.z)*.25;
  gunGrp.rotation.x+=(0-gunGrp.rotation.x)*.25;
  gunGrp.position.y+=(0-gunGrp.position.y)*.15;

  if(reloading){
    reloadLeft-=dt;
    // Reload animation - mag wobble
    mag.rotation.x=Math.sin(reloadLeft*6)*.12;
    if(reloadLeft<=0){finishReload();mag.rotation.x=0;}
  }
  if(hmTimer>0){hmTimer-=dt;if(hmTimer<=0)document.getElementById('hm').classList.remove('on');}

  timerAcc+=dt;
  if(timerAcc>=1){timerAcc-=1;roundTime--;updTimer();}

  movePlayer(dt);
  enemies.forEach(e=>e.update(dt,camera.position));

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.mesh);parts.splice(i,1);}
    else{
      p.vel.y-=10*dt;
      p.mesh.position.addScaledVector(p.vel,dt);
      p.mesh.material.opacity=Math.min(1,p.life*3);
      if(!p.isSpark)p.mesh.rotation.x+=dt*3;
    }
  }

  drawRadar();
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

requestAnimationFrame(loop);
</script>
